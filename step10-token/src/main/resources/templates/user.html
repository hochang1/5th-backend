<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="ko">
<head>
    <meta charset="UTF-8">
    <title>User Page</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 60px auto; padding: 20px; }
        .card { background: white; border: 1px solid #ddd; border-radius: 8px; padding: 24px; margin: 12px 0; }
        .btn { padding: 10px 20px; border-radius: 4px; color: white; border: none; cursor: pointer; font-size: 14px; text-decoration: none; display: inline-block; margin: 4px; }
        .btn-red  { background: #f44336; }
        .btn-gray { background: #9E9E9E; }
        pre { background: #f5f5f5; padding: 12px; border-radius: 4px; font-size: 13px; }
        .badge { background: #e3f2fd; color: #1565c0; padding: 3px 10px; border-radius: 12px; font-size: 13px; margin: 2px; display: inline-block; }
    </style>
</head>
<body>
    <h1>👤 User Page</h1>
    <p>✅ ROLE_USER 이상만 접근 가능</p>

    <div class="card">
        <!--
            서버 렌더링으로 사용자 정보 표시
            SecurityConfig: .requestMatchers("/user").hasAnyRole("USER","MANAGER","ADMIN")
            → 미인가 접근 시 서버가 /access-denied로 redirect (SecurityConfig 설정)
            → 미인증 접근 시 서버가 /login으로 redirect
        -->
        <h3>내 정보 (서버 렌더링)</h3>
        <p>사용자명: <b><span sec:authentication="name"></span></b></p>
        <p>
            권한:
            <!--
                sec:authentication="authorities" → 권한 목록
                Thymeleaf에서 컬렉션 순회
            -->
            <span th:each="auth : ${#authentication.authorities}">
                <span class="badge" th:text="${auth.authority}"></span>
            </span>
        </p>
    </div>

    <div class="card">
        <h3>API 호출 결과 (fetch)</h3>
        <!--
            서버 렌더링 + fetch 혼용
            - 정적 정보: Thymeleaf 서버 렌더링
            - 동적 데이터: fetch로 API 호출
            fetch 시 Cookie가 자동 전송 → Filter가 토큰 검증
        -->
        <pre id="apiResult">버튼을 클릭하세요</pre>
        <button class="btn btn-gray" onclick="loadUserInfo()">API 호출</button>
    </div>

    <br>
    <button class="btn btn-red" onclick="logout()">로그아웃</button>
    <a th:href="@{/index}" class="btn btn-gray">← 홈으로</a>

<script>
    async function loadUserInfo() {
        const response = await fetch('/api/v1/user/info', {
            credentials: 'include'  // httpOnly Cookie 자동 전송
        });

        if (response.ok) {
            const data = await response.json();
            document.getElementById('apiResult').textContent = JSON.stringify(data, null, 2);
        } else if (response.status === 401) {
            // Access Token 만료 → /api/v1/auth/refresh 후 재시도
            const refreshed = await tryRefresh();
            if (refreshed) loadUserInfo();
            else window.location.href = '/login';
        }
    }

    /**
     * Access Token 재발급 시도
     * Refresh Token은 httpOnly Cookie로 자동 전송 → JS 코드 없음
     */
    async function tryRefresh() {
        const res = await fetch('/api/v1/auth/refresh', {
            method: 'POST',
            credentials: 'include'
        });
        return res.ok;
    }

    async function logout() {
        await fetch('/api/v1/auth/logout', { method: 'POST', credentials: 'include' });
        window.location.href = '/login';
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Manager Page</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 60px auto; padding: 20px; }
        .card { background: white; border: 1px solid #ddd; border-radius: 8px; padding: 24px; margin: 12px 0; }
        .btn { padding: 10px 20px; border-radius: 4px; color: white; border: none; cursor: pointer; font-size: 14px; text-decoration: none; display: inline-block; margin: 4px; }
        .btn-red    { background: #f44336; }
        .btn-orange { background: #FF9800; }
        .btn-gray   { background: #9E9E9E; }
        pre { background: #f5f5f5; padding: 12px; border-radius: 4px; font-size: 13px; }
        .badge { background: #fff3e0; color: #e65100; padding: 3px 10px; border-radius: 12px; font-size: 13px; }
    </style>
</head>
<body>
    <h1>📋 Manager Page</h1>
    <p>✅ ROLE_MANAGER 이상만 접근 가능</p>

    <div class="card">
        <h3>접속 정보</h3>
        <p>사용자명: <b><span sec:authentication="name"></span></b></p>
        <p>
            권한:
            <span th:each="auth : ${#authentication.authorities}">
                <span class="badge" th:text="${auth.authority}"></span>
            </span>
        </p>
    </div>

    <div class="card">
        <h3>문서 관리</h3>
        <pre id="documents">버튼을 클릭하세요</pre>
        <button class="btn btn-orange" onclick="loadDocuments()">문서 조회</button>
    </div>

    <br>
    <button class="btn btn-red" onclick="logout()">로그아웃</button>
    <a th:href="@{/index}" class="btn btn-gray">← 홈으로</a>

<script>
    async function loadDocuments() {
        const response = await fetch('/api/v1/manager/documents', {
            credentials: 'include'
        });

        if (response.ok) {
            const data = await response.json();
            document.getElementById('documents').textContent = JSON.stringify(data, null, 2);
        } else if (response.status === 401) {
            const refreshed = await tryRefresh();
            if (refreshed) loadDocuments();
            else window.location.href = '/login';
        } else if (response.status === 403) {
            alert('접근 권한이 없습니다');
            window.location.href = '/access-denied';
        }
    }

    async function tryRefresh() {
        const res = await fetch('/api/v1/auth/refresh', {
            method: 'POST',
            credentials: 'include'
        });
        return res.ok;
    }

    async function logout() {
        await fetch('/api/v1/auth/logout', { method: 'POST', credentials: 'include' });
        window.location.href = '/login';
    }
</script>
</body>
</html>

|

          <th class="category col-2"><a>Category</a></th>

        </tr>
        </thead>
        <tbody>
        <tr>
          <td class="title"><a href="">Title</a></td>
          <td class="category"><span class="badge text-bg-secondary mx-1"><a class="text-reset" href="">Category</a></span></td>

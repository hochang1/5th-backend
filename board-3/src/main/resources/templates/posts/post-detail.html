<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Post Detail Page</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>

<body>

  <th:block th:replace="/layout/header :: headerLayout"></th:block>

  <main id="post-main" class="container">
    <header id="post-header" class="py-5 text-center">
      <h1>Post Detail</h1>
    </header>

    <div class="row g-5">
      <section class="col-md-3 col-lg-4 order-md-last">
        <aside>
          <p><a id="created-by" th:text="${post?.createdBy}">Admin Email</a></p>
          <p><time id="created-date" th:text="${#temporals.format(post?.createdDate, 'yyyy-MM-dd HH:mm:ss')}">2026-03-09</time></p>
          <p><span id="category" class="badge text-bg-secondary mx-1" th:text="${post?.categoryType}">WEB</span></p>
        </aside>
      </section>

      <article id="post-content" class="col-md-9 col-lg-8">
        <div class="card">
		  <div class="card-body">
		    <h5 class="card-title">Title : [[${post?.title}]]</h5>
		    <p class="card-text">Content : [[${post?.content}]]</p>
		  </div>
		</div>
      </article>
    </div>

     <div class="row g-5" id="post-buttons">
      <form id="delete-post-form" method="POST"
      		th:action="@{/posts/{pid}/delete (pid=${post?.id})}">
        <div class="pb-5 d-grid gap-2 d-md-block">
          <a class="btn btn-success me-md-2" role="button" id="update-post"
             th:href="@{/posts/{pid}/form (pid=${post?.id})}">Edit</a>
          <button class="btn btn-danger me-md-2" type="submit">Delete</button>
        </div>
      </form>
    </div>

    <div class="row g-5">
      <section>
        <form class="row g-3 comment-form"
        		th:action="@{/comments}"
        		method="POST">
          <input type="hidden" class="post-id" id="pid" name="pid" th:value="${post?.id}">
          <div class="col-md-9 col-lg-8">
            <label for="comment-textbox" hidden>Comment</label>
            <textarea class="form-control comment-textbox" id="comment-textbox" name="content" placeholder="Comment Content" rows="3" required></textarea>
          </div>
          <div class="col-md-3 col-lg-4">
            <label for="comment-submit" hidden>Comment Registration</label>
            <button class="btn btn-primary" id="comment-submit" type="submit">Registration</button>
          </div>
        </form>

         <ul id="post-comment" class="row col-md-10 col-lg-8 pt-3">
          <li class="post-comment" th:each="comment : ${comments}">
          <hr>
            <form class="comment-delete-form"
            	th:action="@{/comments/{pcid}/delete (pcid=${comment?.id})}"
            	method="POST">
              <input type="hidden" class="post-id" name="pid" th:value="${post?.id}">
              <div class="row">
                <div class="col-md-10 col-lg-9">
                  <strong th:text=${comment?.uid}>Comment Creator</strong>
                  <small><time  th:text="${#temporals.format(comment?.createdDate, 'yyyy-MM-dd HH:mm:ss')}">2026-03-09</time></small>
                  <p class="mb-1" th:text=${comment?.content}></p>
                </div>
                <div class="col-2 mb-3 align-self-center">
                  <button type="submit" class="btn btn-outline-danger">DELETE</button>
                </div>
              </div>
            </form>
          </li>
        </ul> 
      </section>
    </div>

    <!-- <div class="row g-5">
      <nav id="pagination" aria-label="Page navigation">
        <ul class="pagination">
          <li class="page-item">
            <a class="page-link" href="#" aria-label="Previous">
              <span aria-hidden="true">&laquo; prev</span>
            </a>
          </li>
          <li class="page-item">
            <a class="page-link" href="#" aria-label="Next">
              <span aria-hidden="true">next &raquo;</span>
            </a>
          </li>
        </ul>
      </nav>
    </div> -->
  </main>

 <th:block th:replace="/layout/footer :: footerLayout"></th:block>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>

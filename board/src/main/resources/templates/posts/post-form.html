<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>New Post</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>

<body>
  <th:block th:replace="/layout/header :: headerLayout"></th:block>

  <div class="container">
    <header id="post-form-header" class="py-5 text-center">
      <h1 th:text="${post != null} ? 'Post Update': 'Post Registration'">Post</h1>
    </header>

    <form th:action="${post != null}? @{/posts/{pid}/edit (pid=${post?.id})} : @{/posts}" method="POST" id="post-form">
	  <div class="row mb-3 justify-content-md-center">
	    <label for="category" class="col-sm-2 col-lg-1 col-form-label text-sm-end">Category</label>
	    <div class="col-sm-8 col-lg-9">
		    <select class="form-select" name="categoryType" aria-label="Default select example" id="category">
			  <option th:selected="${post == null}">Category</option>
			  <option value="FRONT" th:selected="${post != null and post.categoryType?.name() == 'FRONT'}">FRONT</option>
			  <option value="WEB" th:selected="${post != null and post.categoryType?.name() == 'WEB'}">WEB</option>
			  <option value="BACKEND" th:selected="${post != null and post.categoryType?.name() == 'BACKEND'}">BACKEND</option>
		    </select>
   		    <button type="button" class="btn btn-outline-primary btn-sm" id="btn-category">
		        AI 추천
		    </button>
	    </div>
	  </div>
      <div class="row mb-3 justify-content-md-center">
        <label for="title" class="col-sm-2 col-lg-1 col-form-label text-sm-end">Title</label>
        <div class="col-sm-8 col-lg-9">
          <input type="text" class="form-control" id="title" name="title" th:value="${post?.title}" required>
        </div>
      </div>
      <div class="row mb-3 justify-content-md-center">
        <label for="content" class="col-sm-2 col-lg-1 col-form-label text-sm-end">Contents</label>
        <div class="col-sm-8 col-lg-9">
          <textarea class="form-control" id="content" name="content" rows="5" th:text="${post?.content}" required></textarea>
           <button type="button" class="btn btn-outline-secondary btn-sm mt-1" id="btn-correct">
		        맞춤법 교정
		    </button>
        </div>
      </div>
      <div class="row mb-5 justify-content-md-center">
        <div class="col-sm-10 d-grid gap-2 d-sm-flex justify-content-sm-end">
          <button type="submit" class="btn btn-primary" id="submit-button"
          		  th:text="${post != null}? 'Modify' : 'Register'">Register</button>
          <button type="button" class="btn btn-secondary" id="cancel-button">Cancel</button>
        </div>
      </div>
    </form>
  </div>

  <th:block th:replace="/layout/footer :: footerLayout"></th:block>
	<script>
	    // 카테고리 자동 추천
	    document.getElementById('btn-category').addEventListener('click', () => {
	        const title   = document.getElementById('title').value;
	        const content = document.getElementById('content').value;
			
	        fetch('/api/ai/category', {
	            method: 'POST',
	            headers: { 'Content-Type': 'application/json' },
	            body: JSON.stringify({ title, content })
	        })
	        .then(res => res.text())
	        .then(category => {
					console.log(category);
					document.getElementById("category").value = category;
					alert("AI 추천 카테고리 : " + category);
		    });
	    });
	
	    // 맞춤법 교정
	    document.getElementById('btn-correct').addEventListener('click', () => {
	        const content = document.getElementById('content').value;
	
	        fetch('/api/ai/correct', {
	            method: 'POST',
	            headers: { 'Content-Type': 'application/json' },
	            body: JSON.stringify({ content })
	        })
	        .then(res => res.text())
	        .then(corrected => {
	        	document.getElementById("content").value = corrected;
	
	        });
	    });
	</script>
	

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>

<!DOCTYPE html>
<html xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
	<meta charset="UTF-8">
	<title>About Page</title>
</head>
<body>
	<h1>About Page</h1>
	
	<hr>
	<span sec:authentication="name"></span>          <!-- username -->
	<br>
	<span sec:authentication="principal.email"></span> <!-- PrincipalDetails의 필드 -->
	
	<div sec:authorize="isAnonymous()">
	    <a href="/login">로그인</a>
	</div>
	<div sec:authorize="isAuthenticated()">
	    <form action="/logout" method="POST">
	        <button>로그아웃</button>
	    </form>
	</div>
	
	<div sec:authorize="hasRole('USER')">일반 유저 메뉴</div>
	<div sec:authorize="hasAnyRole('MANAGER', 'ADMIN')">매니저 이상 메뉴</div>
	
</body>
</html>
